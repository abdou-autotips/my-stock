<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>HA - نظام إدارة المبيعات مع النسخ الاحتياطي</title>
    <style>
        :root { --main: #D35400; --dark: #2c3e50; --green: #27ae60; --blue: #2980b9; --red: #c0392b; --purple: #8e44ad; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 20px; margin: 0; }
        .container { max-width: 1200px; background: white; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* مركز النسخ الاحتياطي */
        .backup-bar { background: #ebf5fb; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; gap: 10px; align-items: center; border: 1px dashed var(--blue); }
        .backup-bar span { font-weight: bold; color: var(--blue); flex-grow: 1; }

        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; border: none; cursor: pointer; background: #ddd; font-weight: bold; border-radius: 5px 5px 0 0; }
        .tab-btn.active { background: var(--main); color: white; }
        
        .content { display: none; padding: 20px; border: 1px solid #ddd; border-radius: 0 0 5px 5px; }
        .content.active { display: block; }
        
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; background: #eee; padding: 15px; border-radius: 8px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        button:hover { opacity: 0.8; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: var(--dark); color: white; padding: 10px; }
        td { border-bottom: 1px solid #eee; padding: 8px; text-align: center; }
        
        .img-box { width: 45px; height: 45px; object-fit: cover; background: #ccc; border-radius: 5px; }
        .profit-area { background: #d4efdf; padding: 15px; margin-top: 10px; border-radius: 5px; color: #1b5e20; font-size: 1.2rem; }
        
        @media print { .no-print { display: none !important; } .container { width: 100%; box-shadow: none; border: none; } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--main); margin-top:0;">HA - إدارة المخازن والمبيعات</h2>

    <div class="backup-bar no-print">
        <span>🛡️ مركز الأمان:</span>
        <button style="background: var(--purple);" onclick="exportData()">📥 تحميل نسخة احتياطية</button>
        <button style="background: var(--dark);" onclick="document.getElementById('importFile').click()">📤 استرجاع نسخة</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

    <div class="tabs no-print">
        <button class="tab-btn active" onclick="switchTab(event, 'inv')">📦 المخزن (Arrivage)</button>
        <button class="tab-btn" onclick="switchTab(event, 'pos')">🛒 البيع (Ventes)</button>
    </div>

    <div id="inv" class="content active">
        <div class="grid-inputs no-print">
            <input type="text" id="name" placeholder="اسم القطعة">
            <input type="text" id="ref" placeholder="المرجع (Ref)">
            <input type="text" id="vend" placeholder="المورد">
            <input type="number" id="buy" placeholder="سعر الشراء">
            <input type="number" id="sell" placeholder="سعر البيع">
            <input type="number" id="qty" placeholder="الكمية">
            <input type="file" id="img" accept="image/*" style="font-size: 11px;">
            <button style="background: var(--blue)" onclick="saveToStock()">📥 إضافة للمخزن</button>
        </div>
        <table>
            <thead>
                <tr><th>الصورة</th><th>الاسم</th><th>المرجع</th><th>المورد</th><th>شراء</th><th>بيع</th><th>الكمية</th><th class="no-print">حذف</th></tr>
            </thead>
            <tbody id="invTableBody"></tbody>
        </table>
    </div>

    <div id="pos" class="content">
        <div class="no-print" style="margin-bottom:20px; background:#f9f9f9; padding:15px; border-radius:8px">
            <input type="text" id="cust" placeholder="اسم الزبون" style="width:250px; margin-bottom:10px"><br>
