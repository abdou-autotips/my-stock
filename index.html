<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA EXPERT v5.0 - المتجر المتزامن</title>
    <style>
        :root { --main: #D35400; --dark: #2c3e50; --green: #27ae60; --blue: #2980b9; --red: #c0392b; --orange: #f39c12; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .container { max-width: 1200px; background: white; margin: auto; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; cursor: pointer; background: #ddd; font-weight: bold; border-radius: 8px; }
        .tab-btn.active { background: var(--main); color: white; }
        .content { display: none; }
        .content.active { display: block; }
        
        /* المتجر */
        .search-box { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid var(--main); border-radius: 8px; box-sizing: border-box; }
        .store-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        .product-card { border: 1px solid #eee; border-radius: 10px; padding: 10px; text-align: center; background: white; position: relative; }
        .product-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
        .out-of-stock { filter: grayscale(1); opacity: 0.6; }
        .stock-badge { position: absolute; top: 5px; left: 5px; background: var(--red); color: white; padding: 2px 5px; border-radius: 5px; font-size: 0.7rem; }
        .price { color: var(--main); font-weight: bold; margin: 5px 0; }

        /* لوحة المدير */
        .admin-form { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ddd; }
        .admin-form input { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: var(--dark); color: white; padding: 10px; }
        td { border-bottom: 1px solid #eee; padding: 8px; text-align: center; }

        /* الأزرار العائمة */
        .cart-float { position: fixed; bottom: 20px; left: 20px; background: var(--green); color: white; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 1000; }
        
        #bonModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; padding:20px; box-sizing:border-box; }
        .bon-content { background:white; max-width:600px; margin:auto; padding:20px; border-radius:10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--main);">HA EXPERT v5.0 🚀</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'store')">🛒 المتجر</button>
        <button class="tab-btn" onclick="secureAccess(event)">📦 المدير</button>
    </div>

    <div id="store" class="content active">
        <input type="text" id="storeSearch" class="search-box" placeholder="🔍 ابحث عن قطعة أو مرجع..." onkeyup="filterAll()">
        <div id="loadStatus" style="text-align:center; color:var(--blue); margin-bottom:10px;">جاري تحديث السلعة...</div>
        <div class="store-grid" id="storeBody"></div>
    </div>

    <div id="inventory" class="content">
        <div class="admin-form">
            <h4>إضافة سلعة جديدة</h4>
            <input type="text" id="name" placeholder="اسم القطعة">
            <input type="text" id="ref" placeholder="المرجع (Ref)">
            <input type="text" id="cat" placeholder="الماركة (206, Symbol...)">
            <input type="number" id="buy" placeholder="سعر الشراء">
            <input type="number" id="sell" placeholder="سعر البيع">
            <input type="number" id="qty" placeholder="الكمية">
            <input type="file" id="img" accept="image/*">
            <button onclick="saveToStock()" style="width:100%; background:var(--blue); color:white; padding:10px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">📥 إضافة للمخزون المحلي</button>
        </div>

        <div style="background:#fff3cd; padding:15px; border-radius:10px; margin-bottom:20px; border:1px solid #ffeeba;">
            <p style="margin:0 0 10px 0; font-weight:bold;">⚠️ لنشر السلعة للزبائن:</p>
            <button onclick="exportData()" style="background:var(--dark); color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;">1. تحميل ملف stock.json</button>
            <p style="font-size:0.8rem; margin:5px 0;">2. ارفع الملف المحمل إلى حسابك في GitHub (نفس مكان index.html).</p>
        </div>

        <table>
            <thead><tr><th>الصورة</th><th>الاسم/المرجع</th><th>الكمية</th><th>حذف</th></tr></thead>
            <tbody id="stockBody"></tbody>
        </table>
    </div>
</div>

<div class="cart-float" onclick="openBon()">
    <span id="cartCount">0</span> قطع | إنشاء وصل 📄
</div>

<div id="bonModal">
    <div class="bon-content">
        <button onclick="closeBon()" style="float:left;">X</button>
        <h3>وصل استلام</h3>
        <div id="printableBon" style="border:1px solid #333; padding:10px;">
            <h2 style="text-align:center;">HA EXPERT</h2>
            <div id="bonItems"></div>
            <hr>
            <div id="bonTotal" style="font-weight:bold; text-align:left;"></div>
        </div>
        <button onclick="window.print()" style="width:100%; margin-top:10px; background:var(--dark); color:white; padding:10px;">طباعة</button>
    </div>
</div>

<script>
    let stock = [];
    let cart = [];
    const SECRET_KEY = "HA2026";

    // 1. أهم وظيفة: جلب السلعة من ملف stock.json المرفوع على GitHub
    async function loadPublicStock() {
        try {
            const response = await fetch('stock.json'); // يحاول قراءة الملف من GitHub
            if (response.ok) {
                const publicData = await response.json();
                stock = publicData;
                document.getElementById('loadStatus').innerText = "✅ تم تحديث السلعة بنجاح";
            } else {
                // إذا لم يجد ملف، يقرأ من الذاكرة المحلية (للمدير فقط)
                stock = JSON.parse(localStorage.getItem('ha_stock')) || [];
                document.getElementById('loadStatus').innerText = "⚠️ لم يتم العثور على ملف منشر (استخدام الذاكرة المحلية)";
            }
        } catch (e) {
            stock = JSON.parse(localStorage.getItem('ha_stock')) || [];
            document.getElementById('loadStatus').innerText = "⚠️ خطأ في المزامنة (استخدام الذاكرة المحلية)";
        }
        renderStore();
        renderAdminTable();
    }

    function saveToStock() {
        const name = document.getElementById('name').value;
        const ref = document.getElementById('ref').value || '---';
        const cat = document.getElementById('cat').value || 'عام';
        const buy = parseFloat(document.getElementById('buy').value) || 0;
        const sell = parseFloat(document.getElementById('sell').value) || 0;
        const qty = parseFloat(document.getElementById('qty').value) || 0;
        const imgInput = document.getElementById('img');

        if(!name) return alert("الاسم ضروري!");

        const finalize = (imgData) => {
            stock.push({ id: Date.now(), name, ref, cat, buy, sell, qty, img: imgData || '' });
            localStorage.setItem('ha_stock', JSON.stringify(stock));
            updateAll();
            document.querySelectorAll('.admin-form input').forEach(i => i.value='');
        };

        if (imgInput.files[0]) {
            const r = new FileReader(); r.onload = (e) => finalize(e.target.result); r.readAsDataURL(imgInput.files[0]);
        } else finalize('');
    }

    function exportData() {
        // تحميل الملف باسم stock.json ليرفعه المدير إلى GitHub
        const blob = new Blob([JSON.stringify(stock)], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "stock.json";
        a.click();
    }

    function renderStore() {
        document.getElementById('storeBody').innerHTML = stock.map(item => `
            <div class="product-card ${item.qty <= 0 ? 'out-of-stock' : ''}">
                ${item.qty <= 0 ? '<span class="stock-badge">خلاصت</span>' : ''}
                <img src="${item.img || 'https://via.placeholder.com/150'}">
                <h4>${item.name}</h4>
                <div style="font-size:0.7rem; color:#666;">Ref: ${item.ref}</div>
                <div class="price">${item.sell} د.ج</div>
                <button onclick="addToCart('${item.id}')" ${item.qty <= 0 ? 'disabled' : ''} style="background:var(--green); color:white; border:none; width:100%; padding:8px; border-radius:5px; cursor:pointer;">+ طلب</button>
            </div>
        `).join('');
    }

    function renderAdminTable() {
        document.getElementById('stockBody').innerHTML = stock.map((item, idx) => `
            <tr>
                <td><img src="${item.img}" style="width:40px; height:40px; object-fit:cover;"></td>
                <td>${item.name}<br><small>${item.ref}</small></td>
                <td>${item.qty}</td>
                <td><button onclick="deleteItem(${idx})" style="color:red; background:none; border:none;">X</button></td>
            </tr>
        `).join('');
    }

    function filterAll() {
        let s = document.getElementById('storeSearch').value.toLowerCase();
        document.querySelectorAll('.product-card').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(s) ? "" : "none";
        });
    }

    function updateAll() { renderStore(); renderAdminTable(); }
    function switchTab(evt, tabName) {
        document.querySelectorAll('.content').forEach(c => c.style.display = "none");
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).style.display = "block";
        if(evt.currentTarget) evt.currentTarget.classList.add("active");
    }
    function secureAccess(evt) {
        let p = prompt("كود المدير:");
        if (p === SECRET_KEY) switchTab(evt, 'inventory');
        else alert("خطأ!");
    }
    function addToCart(id) {
        cart.push(stock.find(i => i.id == id));
        document.getElementById('cartCount').innerText = cart.length;
    }
    function openBon() {
        document.getElementById('bonModal').style.display = "block";
        let t = 0;
        document.getElementById('bonItems').innerHTML = cart.map(i => { t+=parseFloat(i.sell); return `<p>${i.name} - ${i.sell} د.ج</p>`; }).join('');
        document.getElementById('bonTotal').innerText = "المجموع: " + t + " د.ج";
    }
    function closeBon() { document.getElementById('bonModal').style.display = "none"; }
    function deleteItem(idx) { stock.splice(idx,1); localStorage.setItem('ha_stock', JSON.stringify(stock)); updateAll(); }

    // عند فتح الصفحة، جلب السلعة فوراً
    window.onload = loadPublicStock;
</script>
</body>
</html>
