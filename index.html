<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA EXPERT v6.6 - Final Fix</title>
    <style>
        :root { --main: #D35400; --dark: #2c3e50; --green: #27ae60; --blue: #2980b9; --bg: #f4f7f6; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); margin: 0; padding: 10px; color: var(--dark); }
        .container { max-width: 1100px; background: white; margin: auto; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Store UI */
        .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 15px; }
        .product-card { border: 1px solid #eee; border-radius: 10px; padding: 10px; text-align: center; background: #fff; display: flex; flex-direction: column; justify-content: space-between; min-height: 290px; }
        .product-card img { width: 100%; height: 140px; object-fit: contain; border-radius: 8px; background: #fbfbfb; }
        .product-card h4 { font-size: 0.85rem; margin: 10px 0; height: 35px; overflow: hidden; line-height: 1.2; }
        .price { color: var(--main); font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; }
        
        /* Buttons */
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; }
        .btn-green { background: var(--green); }
        .btn-blue { background: var(--blue); }
        .btn-dark { background: var(--dark); }
        
        /* Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 14px; border: none; background: #e0e0e0; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--main); color: white; }

        /* Admin Form */
        .admin-form { background: #fdfdfd; padding: 20px; border-radius: 10px; border: 1px solid #e0e0e0; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .admin-form input { grid-column: span 2; padding: 12px; border: 1px solid #ccc; border-radius: 6px; }

        /* Table */
        .table-wrap { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 10px; border: 1px solid #eee; text-align: center; font-size: 0.9rem; }

        /* Modal */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; padding: 10px; overflow-y: auto; }
        .modal-content { background:white; max-width:500px; margin: 20px auto; padding:20px; border-radius:10px; position: relative; }

        .cart-float { position: fixed; bottom: 20px; left: 20px; background: var(--green); color: white; padding: 15px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 1000; }
        
        @media print { .no-print { display: none; } .modal { position: absolute; display: block; background: white; } }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color:var(--main); margin:0 0 20px 0;">HA EXPERT</h1>
    
    <div class="tabs no-print">
        <button class="tab-btn active" onclick="switchTab(event, 'store')">🛒 المتجر</button>
        <button class="tab-btn" onclick="secureAccess(event)">🛠️ لوحة التحكم</button>
    </div>

    <div id="store" class="content">
        <input type="text" class="admin-form" style="display:block; width:100%;" placeholder="🔍 ابحث عن قطعة..." onkeyup="filterProducts(this.value)">
        <div class="store-grid" id="storeBody"></div>
    </div>

    <div id="inventory" class="content" style="display: none;">
        <div class="admin-form">
            <input type="text" id="p_name" placeholder="اسم القطعة">
            <input type="text" id="p_ref" placeholder="المرجع (Ref)">
            <input type="number" id="p_buy" style="grid-column: span 1;" placeholder="سعر الشراء">
            <input type="number" id="p_sell" style="grid-column: span 1;" placeholder="سعر البيع">
            <input type="number" id="p_qty" placeholder="الكمية">
            <input type="file" id="p_img" accept="image/*">
            <button onclick="addProduct()" class="btn-main btn-blue">📥 إضافة</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>الاسم</th><th>المرجع</th><th>شراء</th><th>بيع</th><th>مخزون</th><th>حذف</th></tr></thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="cart-float no-print" onclick="openBon()">
    🛒 <span id="cartCount">0</span> قطع | الوصل 📄
</div>

<div id="bonModal" class="modal">
    <div class="modal-content">
        <button class="no-print" onclick="closeModal()" style="float:left;">X</button>
        <div id="printableBon">
            <h2 style="text-align:center;">HA EXPERT - الوصل</h2>
            <p id="bonDate" style="text-align:center; font-size:0.8rem;"></p>
            <table style="width:100%">
                <thead><tr><th>القطعة</th><th>السعر</th><th>الكمية</th><th>المجموع</th></tr></thead>
                <tbody id="bonItemsBody"></tbody>
                <tfoot><tr style="background:#eee; font-weight:bold;"><td colspan="3">الإجمالي:</td><td id="bonTotal">0</td></tr></tfoot>
            </table>
        </div>
        <button class="btn-main btn-dark no-print" style="margin-top:15px;" onclick="window.print()">🖨️ طباعة الوصل</button>
    </div>
</div>

<script>
    let stock = JSON.parse(localStorage.getItem('ha_stock')) || [];
    let cart = {}; // سلة المشتريات

    function save() {
        localStorage.setItem('ha_stock', JSON.stringify(stock));
        render();
    }

    // --- إضافة للوصل (The Fix) ---
    function addToCart(id) {
        const item = stock.find(p => p.id == id);
        if (cart[id]) {
            cart[id].qty += 1;
        } else {
            cart[id] = { ...item, qty: 1 };
        }
        updateCartCount();
        // تأثير بصري خفيف
        alert(`تمت إضافة: ${item.name}`);
    }

    function updateCartCount() {
        const count = Object.values(cart).reduce((sum, item) => sum + item.qty, 0);
        document.getElementById('cartCount').innerText = count;
    }

    function openBon() {
        if (Object.keys(cart).length === 0) return alert("السلة فارغة!");
        
        let total = 0;
        document.getElementById('bonItemsBody').innerHTML = Object.values(cart).map(item => {
            total += (item.sell * item.qty);
            return `<tr><td>${item.name}</td><td>${item.sell}</td><td>${item.qty}</td><td>${item.sell * item.qty}</td></tr>`;
        }).join('');
        
        document.getElementById('bonTotal').innerText = total + " د.ج";
        document.getElementById('bonDate').innerText = new Date().toLocaleString('ar-DZ');
        document.getElementById('bonModal').style.display = "block";
    }

    function closeModal() { document.getElementById('bonModal').style.display = "none"; }

    // --- Admin & Store Functions ---
    function addProduct() {
        const name = document.getElementById('p_name').value;
        const ref = document.getElementById('p_ref').value;
        const buy = document.getElementById('p_buy').value || 0;
        const sell = document.getElementById('p_sell').value || 0;
        const qty = document.getElementById('p_qty').value || 0;
        const imgFile = document.getElementById('p_img').files[0];

        if(!name || !sell) return alert("أدخل الاسم والسعر!");

        const saveItem = (img = '') => {
            stock.push({ id: Date.now(), name, ref, buy, sell, qty, img });
            save();
            ['p_name','p_ref','p_buy','p_sell','p_qty','p_img'].forEach(i => document.getElementById(i).value = '');
        };

        if(imgFile) {
            const r = new FileReader(); r.onload = (e) => saveItem(e.target.result); r.readAsDataURL(imgFile);
        } else saveItem();
    }

    function render() {
        document.getElementById('storeBody').innerHTML = stock.map(item => `
            <div class="product-card">
                <img src="${item.img || 'https://via.placeholder.com/150'}">
                <h4>${item.name}</h4>
                <div class="price">${item.sell} د.ج</div>
                <button class="btn-main btn-green" onclick="addToCart('${item.id}')">+ طلب</button>
            </div>
        `).join('');

        document.getElementById('adminTableBody').innerHTML = stock.map((item, i) => `
            <tr><td>${item.name}</td><td>${item.ref}</td><td>${item.buy}</td><td>${item.sell}</td><td>${item.qty}</td>
            <td><button onclick="stock.splice(${i},1);save()">🗑️</button></td></tr>
        `).join('');
    }

    function switchTab(evt, name) {
        document.querySelectorAll('.content').forEach(c => c.style.display="none");
        document.getElementById(name).style.display="block";
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        evt.currentTarget.classList.add('active');
    }

    function secureAccess(evt) {
        if(prompt("كلمة السر:") === "HA2026") switchTab(evt, 'inventory');
    }

    function filterProducts(v) {
        document.querySelectorAll('.product-card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(v.toLowerCase()) ? "" : "none";
        });
    }

    window.onload = render;
</script>
</body>
</html>
