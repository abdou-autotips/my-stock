<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA EXPERT v8.2 - Stable</title>
    <style>
        :root { --main: #D35400; --dark: #2c3e50; --green: #27ae60; --blue: #2980b9; --bg: #f4f7f6; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 1100px; background: white; margin: auto; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding-bottom: 110px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 14px; border: none; background: #e0e0e0; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--main); color: white; }
        .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .product-card { border: 1px solid #eee; border-radius: 10px; padding: 10px; text-align: center; background: #fff; display: flex; flex-direction: column; justify-content: space-between; min-height: 320px; }
        .product-card img { width: 100%; height: 150px; object-fit: contain; border-radius: 8px; }
        .admin-section { background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; }
        .admin-section input { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; font-size: 0.85rem; }
        .cart-float { position: fixed; bottom: 25px; left: 25px; background: var(--green); color: white; padding: 15px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 8px 25px rgba(0,0,0,0.3); z-index: 9999; border: 2px solid white; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000; padding: 10px; }
        .modal-content { background:white; max-width:650px; margin: 20px auto; padding:20px; border-radius:10px; position: relative; max-height: 90vh; overflow-y: auto; }
        .qty-btn { background: #f0f0f0; border: 1px solid #bbb; padding: 4px 10px; cursor: pointer; font-weight: bold; border-radius: 4px; margin: 0 5px; color: var(--dark); }
        .qty-btn:hover { background: #ddd; }
        @media print { .no-print { display: none !important; } .modal { display: block; position: absolute; top:0; left:0; width:100%; } }
    </style>
</head>
<body>
<div class="container">
    <h1 style="text-align:center; color:var(--main); margin-top:0;">HA EXPERT</h1>
    <div class="tabs no-print">
        <button class="tab-btn active" onclick="switchTab(event, 'store')">🛒 المتجر</button>
        <button class="tab-btn" onclick="secureAccess(event)">🛠️ المدير</button>
    </div>

    <div id="store" class="content">
        <input type="text" style="width:100%; padding:15px; border-radius:8px; border:1px solid #ccc; margin-bottom:15px;" placeholder="🔍 ابحث بالاسم أو المرجع (Ref)..." onkeyup="filterProducts(this.value)">
        <div class="store-grid" id="storeBody"></div>
    </div>

    <div id="inventory" class="content" style="display: none;">
        <div class="admin-section">
            <h4 style="margin:0 0 10px 0;">إحصائيات المخزن:</h4>
            <div style="display: flex; gap: 10px;">
                <div style="flex:1; background:var(--dark); color:white; padding:10px; border-radius:8px;">إجمالي رأس المال: <br> <span id="totalBuy">0</span> د.ج</div>
                <div style="flex:1; background:var(--main); color:white; padding:10px; border-radius:8px;">الأرباح المتوقعة: <br> <span id="totalProfit">0</span> د.ج</div>
            </div>
        </div>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>الاسم</th><th>المرجع</th><th>شراء</th><th>بيع</th><th>مخزون</th></tr></thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="cart-float no-print" onclick="openBon()">🛒 <span id="cartCount">0</span> قطع | الوصل 📄</div>

<div id="bonModal" class="modal">
    <div class="modal-content">
        <button class="no-print" onclick="closeModal()" style="float:left; background:#eee; border:none; padding:10px; cursor:pointer; border-radius:5px;">رجوع (X)</button>
        <div id="printableBon">
            <div style="text-align:center; border-bottom: 2px solid var(--main); padding-bottom:10px;">
                <h2 style="margin:0; color:var(--main);">HA EXPERT</h2>
                <p id="bonContact" style="margin:5px 0; font-size:0.9rem;"></p>
                <p id="bonDate" style="margin:0; font-size:0.8rem;"></p>
            </div>
            <table>
                <thead><tr><th>القطعة</th><th>السعر</th><th>الكمية</th><th>المجموع</th></tr></thead>
                <tbody id="bonItemsBody"></tbody>
                <tfoot><tr style="background:#eee; font-weight:bold;"><td colspan="3">الإجمالي:</td><td id="bonTotal">0</td></tr></tfoot>
            </table>
        </div>
        <button class="no-print" style="width:100%; padding:12px; background:var(--dark); color:white; border:none; border-radius:6px; margin-top:15px; font-weight:bold;" onclick="window.print()">🖨️ طباعة</button>
    </div>
</div>

<script>
    let stock = [];
    let contact = JSON.parse(localStorage.getItem('ha_contact')) || { phone: '+213558713675', email: 'abdou.autotips@gmail.com' };
    let cart = {};

    async function loadStock() {
        try {
            const resp = await fetch('https://abdou-autotips.github.io/my-stock/stock.json?v=' + Date.now());
            const data = await resp.json();
            stock = Array.isArray(data) ? data : (data[0] || []);
            render();
        } catch (e) {
            console.error("خطأ في التحميل:", e);
            render();
        }
    }

    function render() {
        // عرض المتجر
        document.getElementById('storeBody').innerHTML = stock.map(item => {
            const isAvailable = Number(item.qty) > 0;
            return `
            <div class="product-card">
                <img src="${item.img || 'https://via.placeholder.com/150'}">
                <h4>${item.name}</h4>
                <div style="font-size:0.8rem; color:${isAvailable ? 'green' : 'red'};">
                    Ref: ${item.ref} | ${isAvailable ? '✅ متوفر حالياً' : '❌ غير متوفر'}
                </div>
                <div style="color:var(--main); font-weight:bold; margin:10px 0;">${item.sell} د.ج</div>
                <button onclick="${isAvailable ? `addToCart('${item.id}')` : ''}" 
                        style="width:100%; padding:10px; background:${isAvailable ? 'var(--green)' : '#ccc'}; color:white; border:none; border-radius:6px; cursor:pointer;"
                        ${!isAvailable ? 'disabled' : ''}>
                    ${isAvailable ? '+ طلب القطعة' : 'نفذت الكمية'}
                </button>
            </div>`;
        }).join('');

        // عرض المدير
        let tBuy = 0, tProfit = 0;
        document.getElementById('adminTableBody').innerHTML = stock.map((item) => {
            tBuy += (Number(item.buy) * Number(item.qty));
            tProfit += ((Number(item.sell) - Number(item.buy)) * Number(item.qty));
            return `<tr><td>${item.name}</td><td>${item.ref}</td><td>${item.buy}</td><td>${item.sell}</td><td><b>${item.qty}</b></td></tr>`;
        }).join('');
        document.getElementById('totalBuy').innerText = tBuy;
        document.getElementById('totalProfit').innerText = tProfit;
    }

    function addToCart(id) {
        const item = stock.find(p => p.id == id);
        if (cart[id]) cart[id].qty += 1; else cart[id] = { ...item, qty: 1 };
        updateCartCount();
    }

    // الدالة الجديدة لتغيير الكمية من داخل البون
    function changeQtyInCart(id, delta) {
        if (cart[id]) {
            cart[id].qty += delta;
            if (cart[id].qty <= 0) delete cart[id];
            updateCartCount();
            openBon(); // إعادة فتح البون لتحديث الأرقام
        }
    }

    function updateCartCount() { document.getElementById('cartCount').innerText = Object.values(cart).reduce((s, i) => s + i.qty, 0); }

    function openBon() {
        if (Object.keys(cart).length === 0) { closeModal(); return; }
        let total = 0;
        document.getElementById('bonItemsBody').innerHTML = Object.values(cart).map(item => {
            total += (item.sell * item.qty);
            return `<tr>
                <td>${item.name}</td>
                <td>${item.sell}</td>
                <td>
                    <button class="qty-btn no-print" onclick="changeQtyInCart('${item.id}', -1)">-</button>
                    <span>${item.qty}</span>
                    <button class="qty-btn no-print" onclick="changeQtyInCart('${item.id}', 1)">+</button>
                </td>
                <td>${item.sell * item.qty}</td>
            </tr>`;
        }).join('');
        document.getElementById('bonTotal').innerText = total + " د.ج";
        document.getElementById('bonDate').innerText = "التاريخ: " + new Date().toLocaleString('ar-DZ');
        document.getElementById('bonContact').innerText = `الهاتف: ${contact.phone}`;
        document.getElementById('bonModal').style.display = "block";
    }

    function closeModal() { document.getElementById('bonModal').style.display = "none"; }
    function switchTab(e, n) { 
        document.querySelectorAll('.content').forEach(c => c.style.display="none"); 
        document.getElementById(n).style.display="block"; 
        e.currentTarget.classList.add('active');
    }
    function secureAccess(e) { if(prompt("كلمة السر:") === "HA2026") switchTab(e, 'inventory'); }
    function filterProducts(v) { document.querySelectorAll('.product-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(v.toLowerCase()) ? "" : "none"); }

    window.onload = loadStock;
</script>
</body>
</html>
