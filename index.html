<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA EXPERT - نظام التسيير الاحترافي</title>
    <style>
        :root { --main: #D35400; --dark: #2c3e50; --green: #27ae60; --blue: #2980b9; --red: #c0392b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .container { max-width: 1200px; background: white; margin: auto; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; cursor: pointer; background: #ddd; font-weight: bold; border-radius: 8px; }
        .tab-btn.active { background: var(--main); color: white; }
        .content { display: none; }
        .content.active { display: block; }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .btn-add { background: var(--blue); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th { background: var(--dark); color: white; padding: 10px; }
        td { border-bottom: 1px solid #eee; padding: 8px; text-align: center; }
        .img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
        .store-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        .product-card { border: 1px solid #eee; border-radius: 10px; padding: 10px; text-align: center; background: white; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: 130px; object-fit: cover; border-radius: 8px; }
        .price { color: var(--main); font-weight: bold; font-size: 1.1rem; margin: 5px 0; }
        .cart-float { position: fixed; bottom: 20px; left: 20px; background: var(--green); color: white; padding: 12px 20px; border-radius: 50px; cursor: pointer; z-index: 1000; font-weight: bold; border: 2px solid white; }
        .admin-tools { margin-top: 20px; padding: 10px; border-top: 2px dashed #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--main);">HA EXPERT - المبيعات والمخزن</h2>

    <div class="tabs">
        <button id="btn-store" class="tab-btn active" onclick="switchTab(event, 'store')">🛒 واجهة المتجر</button>
        <button id="btn-admin" class="tab-btn" onclick="secureAccess(event)">📦 لوحة المدير</button>
    </div>

    <div id="store" class="content active">
        <div class="store-grid" id="storeBody"></div>
    </div>

    <div id="inventory" class="content">
        <div class="grid-inputs">
            <input type="text" id="name" placeholder="اسم القطعة (باللاتينية للترتيب)">
            <input type="text" id="ref" placeholder="المرجع (Ref)">
            <input type="text" id="vend" placeholder="المورد">
            <input type="number" id="buy" placeholder="سعر الشراء">
            <input type="number" id="sell" placeholder="سعر البيع">
            <input type="number" id="qty" placeholder="الكمية">
            <input type="file" id="img" accept="image/*">
            <button class="btn-add" onclick="saveToStock()">📥 إضافة للمخزن</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>الصورة</th>
                    <th>الاسم (A-Z)</th>
                    <th>شراء</th>
                    <th>بيع</th>
                    <th>الكمية</th>
                    <th>حذف</th>
                </tr>
            </thead>
            <tbody id="stockBody"></tbody>
        </table>

        <div class="admin-tools">
            <h4>نقل البيانات (من الكمبيوتر للهاتف)</h4>
            <button onclick="exportData()" style="background:var(--dark); color:white; padding:8px; border-radius:5px; border:none; cursor:pointer;">📥 تحميل نسخة Backup</button>
            <p style="font-size:0.8rem; color:gray;">انسخ محتوى ملف Backup والصقه هنا لتحديث الهاتف:</p>
            <textarea id="importArea" style="width:100%; height:60px;" placeholder="الصق الكود هنا..."></textarea>
            <button onclick="importData()" style="background:var(--blue); color:white; padding:8px; border-radius:5px; border:none; cursor:pointer; margin-top:5px;">✅ تحديث البيانات</button>
        </div>
    </div>
</div>

<div class="cart-float" onclick="sendWhatsApp()">
    <span id="cartCount">0</span> قطع | اطلب عبر WhatsApp 🛒
</div>

<script>
    let stock = JSON.parse(localStorage.getItem('ha_stock')) || [];
    let cart = [];
    const SECRET_KEY = "HA2026"; // كلمة السر الخاصة بك

    function secureAccess(evt) {
        let pass = prompt("الرجاء إدخال كود الوصول السري:");
        if (pass === SECRET_KEY) {
            switchTab(evt, 'inventory');
        } else {
            alert("⚠️ تنبيه: الكود خاطئ. الدخول ممنوع!");
        }
    }

    function switchTab(evt, tabName) {
        let content = document.getElementsByClassName("content");
        for (let i = 0; i < content.length; i++) content[i].style.display = "none";
        let tablinks = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
        document.getElementById(tabName).style.display = "block";
        if(evt.currentTarget) evt.currentTarget.classList.add("active");
    }

    function saveToStock() {
        const name = document.getElementById('name').value;
        const ref = document.getElementById('ref').value;
        const vend = document.getElementById('vend').value;
        const buy = document.getElementById('buy').value || 0;
        const sell = document.getElementById('sell').value || 0;
        const qty = document.getElementById('qty').value || 0;
        const imgInput = document.getElementById('img');

        if (!name) return alert("الاسم ضروري!");

        const finalize = (imgData) => {
            stock.push({ id: Date.now(), name, ref, vend, buy, sell, qty, img: imgData || '' });
            updateAll();
            document.querySelectorAll('.grid-inputs input').forEach(i => i.value = '');
        };

        if (imgInput.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => finalize(e.target.result);
            reader.readAsDataURL(imgInput.files[0]);
        } else { finalize(''); }
    }

    function updateAll() {
        // ميزة الترتيب الأبجدي A-Z
        stock.sort((a, b) => a.name.toLowerCase().localeCompare(b.name.toLowerCase()));
        
        localStorage.setItem('ha_stock', JSON.stringify(stock));
        renderAdminTable();
        renderStore();
    }

    function renderAdminTable() {
        const body = document.getElementById('stockBody');
        body.innerHTML = stock.map((item, idx) => `
            <tr>
                <td><img src="${item.img}" class="img-preview"></td>
                <td style="text-align:right;">${item.name}</td>
                <td>${item.buy}</td>
                <td>${item.sell}</td>
                <td>${item.qty}</td>
                <td><button onclick="deleteItem(${idx})" style="background:var(--red); color:white; border:none; padding:5px; border-radius:5px;">حذف</button></td>
            </tr>
        `).join('');
    }

    function renderStore() {
        const body = document.getElementById('storeBody');
        body.innerHTML = stock.map((item) => `
            <div class="product-card">
                <img src="${item.img || 'https://via.placeholder.com/150'}">
                <h4>${item.name}</h4>
                <div class="price">${item.sell} د.ج</div>
                <button onclick="addToCart('${item.id}')" style="background:var(--green); color:white; border:none; width:100%; padding:8px; border-radius:5px; cursor:pointer;">إضافة للطلب</button>
            </div>
        `).join('');
    }

    function addToCart(id) {
        cart.push(stock.find(i => i.id == id));
        document.getElementById('cartCount').innerText = cart.length;
    }

    function sendWhatsApp() {
        if (cart.length === 0) return alert("اختر منتجات أولاً!");
        let phone = "213XXXXXXXXX"; // ضع رقمك هنا
        let text = "طلب جديد HA EXPERT:\n";
        let total = 0;
        cart.forEach(item => { text += `- ${item.name} (${item.sell} د.ج)\n`; total += parseFloat(item.sell); });
        text += `\nالمجموع الإجمالي: ${total} د.ج`;
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`);
    }

    function exportData() {
        const dataStr = JSON.stringify(stock);
        const blob = new Blob([dataStr], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "HA_Stock_Backup.json";
        a.click();
    }

    function importData() {
        const val = document.getElementById('importArea').value;
        try {
            const parsed = JSON.parse(val);
            if (Array.isArray(parsed)) {
                stock = parsed;
                updateAll();
                alert("تم تحديث البيانات بنجاح!");
                document.getElementById('importArea').value = '';
            }
        } catch(e) { alert("خطأ في الكود الملصق!"); }
    }

    function deleteItem(idx) { if(confirm("حذف؟")) { stock.splice(idx, 1); updateAll(); } }

    window.onload = updateAll;
</script>
</body>
</html>
