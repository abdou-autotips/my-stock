<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA EXPERT v6.0 - Final Print Fix</title>
    <style>
        :root { --main: #D35400; --dark: #2c3e50; --green: #27ae60; --blue: #2980b9; --red: #c0392b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .container { max-width: 1000px; background: white; margin: auto; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        #loader { text-align:center; padding:50px; background:white; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .spin { border: 5px solid #f3f3f3; border-top: 5px solid var(--main); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; cursor: pointer; background: #ddd; font-weight: bold; border-radius: 8px; }
        .tab-btn.active { background: var(--main); color: white; }
        .content { display: none; }
        .content.active { display: block; }
        
        .search-box { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid var(--main); border-radius: 8px; box-sizing: border-box; }
        .store-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .product-card { border: 1px solid #eee; border-radius: 10px; padding: 10px; text-align: center; background: white; cursor: pointer; }
        .product-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; }
        .price { color: var(--main); font-weight: bold; }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; overflow-y: auto; padding: 10px; }
        .modal-content { background:white; max-width:600px; margin: 20px auto; padding:20px; border-radius:10px; position: relative; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; font-size: 0.9rem; }
        .qty-btn { background: #f0f0f0; border: 1px solid #ccc; padding: 4px 10px; cursor: pointer; border-radius: 5px; font-weight: bold; margin: 0 5px; }

        /* PRINT LOGIC - حل مشكلة الصفحات */
        @media print {
            @page { size: portrait; margin: 0; }
            html, body { height: 100vh; overflow: hidden !important; margin: 0 !important; padding: 0 !important; }
            .container, .tabs, .cart-float, .no-print, #loader, .modal-content > button, .qty-btn { display: none !important; }
            #bonModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white !important; display: block !important; margin: 0; padding: 0; z-index: 9999; }
            .modal-content { max-width: 100% !important; margin: 0 !important; padding: 20px !important; border: none !important; box-shadow: none !important; }
            #printableBon { width: 100%; display: block !important; }
            .print-only-inline { display: inline-block !important; }
        }

        .cart-float { position: fixed; bottom: 20px; left: 20px; background: var(--green); color: white; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 1500; }
    </style>
</head>
<body>

<div id="loader"><div class="spin"></div><h3>جاري التحميل...</h3></div>

<div class="container">
    <h2 style="text-align:center; color:var(--main);">HA EXPERT</h2>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'store')">🛒 المتجر</button>
        <button class="tab-btn" onclick="secureAccess(event)">📦 المدير</button>
    </div>

    <div id="store" class="content active">
        <input type="text" class="search-box" placeholder="🔍 ابحث بالاسم أو المرجع..." onkeyup="filterAll(this.value)">
        <div class="store-grid" id="storeBody"></div>
    </div>

    <div id="inventory" class="content">
        <div style="background:#f9f9f9; padding:15px; border-radius:10px; border:1px solid #ddd; margin-bottom:15px;">
            <input type="text" id="name" placeholder="اسم القطعة" style="width:100%; padding:8px; margin-bottom:5px;">
            <input type="text" id="ref" placeholder="المرجع (Ref)" style="width:100%; padding:8px; margin-bottom:5px;">
            <input type="number" id="sell" placeholder="سعر البيع" style="width:100%; padding:8px; margin-bottom:5px;">
            <input type="number" id="qty" placeholder="الكمية" style="width:100%; padding:8px; margin-bottom:10px;">
            <input type="file" id="img" accept="image/*" style="width:100%; margin-bottom:10px;">
            <button onclick="saveToStock()" style="width:100%; background:var(--blue); color:white; padding:10px; border:none; border-radius:5px;">📥 إضافة</button>
        </div>
        <button onclick="exportData()" style="width:100%; background:var(--dark); color:white; padding:10px; border:none; border-radius:5px;">حفظ وتصدير stock.json</button>
        <div style="overflow-x:auto; margin-top:15px;">
            <table>
                <thead><tr><th>الاسم</th><th>المرجع</th><th>السعر</th><th>الكمية</th><th>حذف</th></tr></thead>
                <tbody id="stockBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="cart-float" onclick="openBon()">
    🛒 <span id="cartCount">0</span> قطع | الوصل 📄
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content" style="text-align:center;">
        <button onclick="closeModal('detailsModal')" style="float:left; background:var(--dark); color:white; border:none; padding:5px 15px; cursor:pointer; border-radius:5px;">رجوع ↩</button>
        <div id="productDetailsBody" style="margin-top:40px;"></div>
    </div>
</div>

<div id="bonModal" class="modal">
    <div class="modal-content">
        <button class="no-print" onclick="closeModal('bonModal')" style="float:left; background:var(--dark); color:white; border:none; padding:8px 20px; cursor:pointer; border-radius:5px; font-weight:bold;">رجوع ↩</button>
        
        <div id="printableBon">
            <div style="text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px;">
                <h1 style="margin:0;">HA EXPERT</h1>
                <p style="margin:2px 0;">قطع غيار السيارات الأصلية</p>
                <p id="bonDate" style="font-size:0.8rem; margin:5px 0;"></p>
                <div style="margin-top:10px;">
                    <label>الزبون: </label>
                    <input type="text" id="customerName" placeholder=".................." style="border:none; border-bottom:1px dashed #333; font-weight:bold; width:200px; background:transparent;">
                </div>
            </div>

            <table>
                <thead>
                    <tr><th>القطعة</th><th>السعر</th><th>الكمية</th><th>المجموع</th></tr>
                </thead>
                <tbody id="bonItemsBody"></tbody>
                <tfoot>
                    <tr style="background:#eee; font-weight:bold; font-size:1.1rem;">
                        <td colspan="3" style="text-align:left;">الإجمالي النهائي (د.ج):</td>
                        <td id="bonTotal">0</td>
                    </tr>
                </tfoot>
            </table>

            <div style="margin-top: 20px; text-align: center; font-size: 0.8rem; border-top: 1px solid #333; padding-top: 10px;">
                <p>📍 الجزائر | 📞 0558713665 - 0550461326</p>
                <p>📧 abdou.autotips@gmail.com</p>
            </div>
        </div>
        
        <div class="no-print" style="margin-top:20px; display: flex; gap: 10px;">
            <button onclick="window.print()" style="flex:1; background:var(--dark); color:white; padding:12px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">🖨️ طباعة</button>
            <button onclick="sendWhatsApp()" style="flex:1; background:var(--green); color:white; padding:12px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">📱 واتساب</button>
        </div>
    </div>
</div>

<script>
    let stock = [];
    let cart = {};
    const SECRET_KEY = "HA2026";
    const WHATSAPP_PHONE = "213558713665"; 

    async function loadStock() {
        try {
            const res = await fetch('stock.json');
            if (res.ok) stock = await res.json();
            else stock = JSON.parse(localStorage.getItem('ha_stock')) || [];
        } catch (e) { stock = JSON.parse(localStorage.getItem('ha_stock')) || []; }
        document.getElementById('loader').style.display = "none";
        updateAll();
    }

    function showDetails(id) {
        const item = stock.find(i => i.id == id);
        document.getElementById('productDetailsBody').innerHTML = `
            <img src="${item.img || 'https://via.placeholder.com/150'}" style="width:100%; max-height:250px; object-fit:contain; border-radius:10px;">
            <h2 style="color:var(--dark);">${item.name}</h2>
            <p style="font-size:1.1rem;"><b>المرجع (Ref):</b> ${item.ref}</p>
            <p style="font-size:1.5rem; color:var(--main);"><b>السعر:</b> ${item.sell} د.ج</p>
            <button onclick="addToCart('${item.id}'); closeModal('detailsModal');" style="width:100%; background:var(--green); color:white; padding:12px; border:none; border-radius:8px; font-size:1.1rem; cursor:pointer;">🛒 إضافة للسلة</button>
        `;
        document.getElementById('detailsModal').style.display = "block";
    }

    function addToCart(id) {
        if (cart[id]) cart[id].qty += 1;
        else {
            const item = stock.find(i => i.id == id);
            cart[id] = { ...item, qty: 1 };
        }
        updateCartCount();
    }

    function changeQty(id, delta) {
        if (!cart[id]) return;
        cart[id].qty += delta;
        if (cart[id].qty <= 0) delete cart[id];
        updateCartCount();
        renderBon();
    }

    function updateCartCount() {
        const count = Object.values(cart).reduce((sum, item) => sum + item.qty, 0);
        document.getElementById('cartCount').innerText = count;
    }

    function renderBon() {
        let total = 0;
        document.getElementById('bonItemsBody').innerHTML = Object.values(cart).map(item => {
            const sub = item.sell * item.qty;
            total += sub;
            return `
                <tr>
                    <td>${item.name}</td>
                    <td>${item.sell}</td>
                    <td>
                        <button class="qty-btn no-print" onclick="changeQty('${item.id}', -1)">-</button>
                        <span>${item.qty}</span>
                        <button class="qty-btn no-print" onclick="changeQty('${item.id}', 1)">+</button>
                    </td>
                    <td>${sub}</td>
                </tr>
            `;
        }).join('');
        document.getElementById('bonTotal').innerText = total;
    }

    function openBon() {
        if (Object.keys(cart).length === 0) return alert("السلة فارغة!");
        renderBon();
        document.getElementById('bonDate').innerText = "بتاريخ: " + new Date().toLocaleString('ar-DZ');
        document.getElementById('bonModal').style.display = "block";
    }

    function sendWhatsApp() {
        let customer = document.getElementById('customerName').value || "زبون";
        let text = `📦 *وصل طلبية - HA EXPERT*\n👤 *الزبون:* ${customer}\n----------\n`;
        let total = 0;
        Object.values(cart).forEach(i => {
            text += `• ${i.name} | ${i.sell}DA x ${i.qty} = ${i.sell * i.qty}DA\n`;
            total += i.sell * i.qty;
        });
        text += `----------\n💰 *المجموع:* ${total} DA`;
        window.open(`https://wa.me/${WHATSAPP_PHONE}?text=${encodeURIComponent(text)}`);
    }

    function saveToStock() {
        const name = document.getElementById('name').value;
        const ref = document.getElementById('ref').value || '---';
        const sell = parseFloat(document.getElementById('sell').value) || 0;
        const qty = parseFloat(document.getElementById('qty').value) || 0;
        const imgInput = document.getElementById('img');
        if(!name) return alert("الاسم ضروري");
        const finalize = (imgData) => {
            stock.push({ id: 'ID'+Date.now(), name, ref, sell, qty, img: imgData || '' });
            localStorage.setItem('ha_stock', JSON.stringify(stock));
            updateAll();
        };
        if(imgInput.files[0]) { const r = new FileReader(); r.onload=e=>finalize(e.target.result); r.readAsDataURL(imgInput.files[0]); }
        else finalize('');
    }

    function updateAll() {
        renderStore();
        renderAdmin();
    }

    function renderStore() {
        document.getElementById('storeBody').innerHTML = stock.map(item => `
            <div class="product-card" onclick="showDetails('${item.id}')">
                <img src="${item.img || 'https://via.placeholder.com/150'}">
                <h4 style="font-size:0.9rem; margin:5px 0;">${item.name}</h4>
                <div class="price">${item.sell} د.ج</div>
            </div>
        `).join('');
    }

    function renderAdmin() {
        document.getElementById('stockBody').innerHTML = stock.map((item, idx) => `
            <tr><td>${item.name}</td><td>${item.ref}</td><td>${item.sell}</td><td>${item.qty}</td>
            <td><button onclick="stock.splice(${idx},1);updateAll();" style="color:red; border:none; background:none; cursor:pointer;">🗑️</button></td></tr>
        `).join('');
    }

    function switchTab(evt, name) {
        document.querySelectorAll('.content').forEach(c => c.style.display="none");
        document.getElementById(name).style.display="block";
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        evt.currentTarget.classList.add('active');
    }

    function secureAccess(evt) {
        if(prompt("كلمة السر:") === SECRET_KEY) switchTab(evt, 'inventory');
    }

    function exportData() {
        const b = new Blob([JSON.stringify(stock)], {type:"application/json"});
        const a = document.createElement("a"); a.href=URL.createObjectURL(b); a.download="stock.json"; a.click();
    }

    function filterAll(s) {
        let val = s.toLowerCase();
        document.querySelectorAll('.product-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(val) ? "" : "none");
    }

    function closeModal(id) { document.getElementById(id).style.display="none"; }
    window.onload = loadStock;
</script>
</body>
</html>
