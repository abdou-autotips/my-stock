<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA - EXPERT | المتجر والمدير</title>
    <style>
        :root { --main: #D35400; --dark: #2c3e50; --green: #27ae60; --blue: #2980b9; --red: #c0392b; --purple: #8e44ad; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 10px; margin: 0; }
        .container { max-width: 1200px; background: white; margin: auto; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* الهيدر والتبويبات */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; cursor: pointer; background: #ddd; font-weight: bold; border-radius: 8px; font-size: 0.9rem; }
        .tab-btn.active { background: var(--main); color: white; }
        
        .content { display: none; }
        .content.active { display: block; }

        /* مدخلات المخزن */
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; background: #eee; padding: 15px; border-radius: 8px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .btn-add { background: var(--blue); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* جدول المخزن (للمدير) */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th { background: var(--dark); color: white; padding: 10px; }
        td { border-bottom: 1px solid #eee; padding: 8px; text-align: center; }
        .img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; background: #eee; }

        /* تصميم المتجر (للزبائن) */
        .store-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .product-card { border: 1px solid #eee; border-radius: 10px; padding: 10px; text-align: center; transition: 0.3s; position: relative; }
        .product-card:hover { box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: 130px; object-fit: cover; border-radius: 8px; }
        .product-card h4 { margin: 10px 0 5px; font-size: 1rem; color: var(--dark); }
        .product-card .price { color: var(--main); font-weight: bold; font-size: 1.1rem; }
        .btn-buy { background: var(--green); color: white; border: none; width: 100%; padding: 8px; border-radius: 5px; margin-top: 10px; cursor: pointer; }

        /* سلة المشتريات */
        .cart-float { position: fixed; bottom: 20px; left: 20px; background: var(--main); color: white; padding: 15px; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; display: flex; align-items: center; gap: 10px; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--main); margin-bottom:15px;">HA EXPERT - نظام التسيير</h2>

    <div class="tabs no-print">
        <button class="tab-btn active" onclick="switchTab(event, 'inventory')">📦 لوحة المدير</button>
        <button class="tab-btn" onclick="switchTab(event, 'store')">🛒 واجهة المتجر</button>
        <button class="tab-btn" style="background:var(--purple); color:white;" onclick="exportData()">📥 نسخة احتياطية</button>
    </div>

    <div id="inventory" class="content active">
        <div class="grid-inputs no-print">
            <input type="text" id="name" placeholder="اسم القطعة">
            <input type="text" id="ref" placeholder="المرجع (Ref)">
            <input type="text" id="vend" placeholder="المورد">
            <input type="text" id="buy" placeholder="سعر الشراء">
            <input type="text" id="sell" placeholder="سعر البيع">
            <input type="text" id="qty" placeholder="الكمية">
            <input type="file" id="img" accept="image/*">
            <button class="btn-add" onclick="saveToStock()">📥 إضافة للمخزن</button>
        </div>

        <table id="adminTable">
            <thead>
                <tr>
                    <th>الصورة</th>
                    <th>الاسم</th>
                    <th>شراء</th>
                    <th>بيع</th>
                    <th>الكمية</th>
                    <th class="no-print">إجراء</th>
                </tr>
            </thead>
            <tbody id="stockBody"></tbody>
        </table>
    </div>

    <div id="store" class="content">
        <div style="background: #ebf5fb; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 10px;">
            📢 أهلاً بكم في متجرنا! اختر ما تحتاجه واضغط على زر الطلب.
        </div>
        <div class="store-grid" id="storeBody"></div>
    </div>
</div>

<div class="cart-float no-print" onclick="sendWhatsApp()">
    <span>🛒</span>
    <span id="cartCount">0</span> قطع | اطلب عبر WhatsApp
</div>

<script>
    let stock = JSON.parse(localStorage.getItem('ha_stock')) || [];
    let cart = [];

    function switchTab(evt, tabName) {
        let content = document.getElementsByClassName("content");
        for (let i = 0; i < content.length; i++) content[i].style.display = "none";
        let tablinks = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
        document.getElementById(tabName).style.display = "block";
        if(evt) evt.currentTarget.classList.add("active");
    }

    function saveToStock() {
        const name = document.getElementById('name').value;
        const ref = document.getElementById('ref').value;
        const buyVal = document.getElementById('buy').value || "0";
        const sellVal = document.getElementById('sell').value || "0";
        const qtyVal = document.getElementById('qty').value || "0";
        const imgInput = document.getElementById('img');

        if (!name || qtyVal == "0") return alert("أدخل الاسم والكمية!");

        let b, s, q;
        try { b = eval(buyVal); s = eval(sellVal); q = eval(qtyVal); } catch(e) { return alert("خطأ في الأرقام"); }

        const reader = new FileReader();
        const finalize = (imgData) => {
            stock.push({ id: Date.now(), name, ref, buy: b, sell: s, qty: q, img: imgData || '' });
            updateAll();
            document.querySelectorAll('.grid-inputs input').forEach(i => i.value = '');
        };

        if (imgInput.files[0]) {
            reader.onload = (e) => finalize(e.target.result);
            reader.readAsDataURL(imgInput.files[0]);
        } else { finalize(''); }
    }

    function updateAll() {
        localStorage.setItem('ha_stock', JSON.stringify(stock));
        renderAdminTable();
        renderStore();
    }

    function renderAdminTable() {
        const body = document.getElementById('stockBody');
        body.innerHTML = stock.map((item, idx) => `
            <tr>
                <td><img src="${item.img}" class="img-preview"></td>
                <td>${item.name}<br><small>${item.ref}</small></td>
                <td>${item.buy}</td>
                <td>${item.sell}</td>
                <td>${item.qty}</td>
                <td class="no-print"><button onclick="deleteItem(${idx})" style="background:var(--red); color:white; border:none; padding:5px; border-radius:3px;">X</button></td>
            </tr>
        `).join('');
    }

    function renderStore() {
        const body = document.getElementById('storeBody');
        body.innerHTML = stock.map((item) => `
            <div class="product-card">
                <img src="${item.img || 'https://via.placeholder.com/150'}">
                <h4>${item.name}</h4>
                <p style="font-size:0.8rem; color:gray;">Ref: ${item.ref}</p>
                <div class="price">${item.sell} د.ج</div>
                <button class="btn-buy" onclick="addToCart('${item.id}')">🛒 إضافة للطلب</button>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const item = stock.find(i => i.id == id);
        cart.push(item);
        document.getElementById('cartCount').innerText = cart.length;
        alert("تمت الإضافة للسلة! ✅");
    }

    function sendWhatsApp() {
        if (cart.length === 0) return alert("السلة فارغة!");
        let phone = "213XXXXXXXXX"; // ضع رقمك هنا بدون أصفار في البداية
        let text = "طلب جديد من متجر HA:\n----------\n";
        let total = 0;
        cart.forEach((item, i) => {
            text += `${i+1}- ${item.name} (Ref: ${item.ref}) | السعر: ${item.sell}\n`;
            total += parseFloat(item.sell);
        });
        text += `----------\nالمجموع الإجمالي: ${total} د.ج`;
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`);
    }

    function deleteItem(idx) {
        if(confirm("حذف؟")) { stock.splice(idx, 1); updateAll(); }
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(stock)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = "HA_Stock.json"; a.click();
    }

    window.onload = updateAll;
</script>
</body>
</html>
