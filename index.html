<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA EXPERT v4.3 - لوحة المدير المطورة</title>
    <style>
        :root { --main: #D35400; --dark: #2c3e50; --green: #27ae60; --blue: #2980b9; --red: #c0392b; --orange: #f39c12; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .container { max-width: 1200px; background: white; margin: auto; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; cursor: pointer; background: #ddd; font-weight: bold; border-radius: 8px; }
        .tab-btn.active { background: var(--main); color: white; }
        .content { display: none; }
        .content.active { display: block; }
        
        /* البحث والمتجر */
        .search-box { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid var(--main); border-radius: 8px; box-sizing: border-box; }
        .store-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        .product-card { border: 1px solid #eee; border-radius: 10px; padding: 10px; text-align: center; background: white; position: relative; }
        .product-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
        .out-of-stock { filter: grayscale(1); opacity: 0.6; }
        .stock-badge { position: absolute; top: 5px; left: 5px; background: var(--red); color: white; padding: 2px 5px; border-radius: 5px; font-size: 0.7rem; }

        /* لوحة المدير - الجدول المطور */
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.9rem; }
        
        .admin-table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; min-width: 600px; }
        th { background: var(--dark); color: white; padding: 12px; font-size: 0.9rem; }
        td { border-bottom: 1px solid #eee; padding: 10px; text-align: center; font-size: 0.85rem; vertical-align: middle; }
        .ref-text { font-family: monospace; color: var(--blue); font-weight: bold; }
        .btn-action { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; margin: 2px; }
        
        /* السلة والوصل */
        .cart-float { position: fixed; bottom: 20px; left: 20px; background: var(--green); color: white; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #bonModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; overflow-y:auto; padding:20px; box-sizing:border-box; }
        .bon-content { background:white; max-width:600px; margin:auto; padding:20px; border-radius:10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--main);">HA EXPERT v4.3</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'store')">🛒 المتجر</button>
        <button class="tab-btn" onclick="secureAccess(event)">📦 لوحة المدير</button>
    </div>

    <div id="store" class="content active">
        <input type="text" id="storeSearch" class="search-box" placeholder="🔍 ابحث بالاسم أو المرجع (Ref)..." onkeyup="filterAll()">
        <div id="catBar" style="display:flex; gap:5px; overflow-x:auto; margin-bottom:15px;"></div>
        <div class="store-grid" id="storeBody"></div>
    </div>

    <div id="inventory" class="content">
        <div class="grid-inputs">
            <input type="text" id="name" placeholder="اسم القطعة">
            <input type="text" id="ref" placeholder="المرجع (Ref)">
            <input type="text" id="cat" placeholder="الماركة">
            <input type="number" id="buy" placeholder="سعر الشراء">
            <input type="number" id="sell" placeholder="سعر البيع">
            <input type="number" id="qty" placeholder="الكمية">
            <input type="file" id="img" accept="image/*">
            <button onclick="saveToStock()" style="background:var(--blue); color:white; border:none; border-radius:5px; cursor:pointer;">📥 إضافة</button>
        </div>

        <div class="admin-table-container">
            <table>
                <thead>
                    <tr>
                        <th>الصورة</th>
                        <th>الاسم / المرجع</th>
                        <th>الصنف</th>
                        <th>الكمية</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="stockBody"></tbody>
            </table>
        </div>

        <button onclick="toggleSync()" style="margin-top:30px; background:none; border:1px solid #ccc; color:#888; padding:8px; border-radius:5px; cursor:pointer;">⚙️ إعدادات الأمان والمزامنة</button>
        <div id="syncTools" style="display:none; background:#f0f2f5; padding:15px; margin-top:10px; border-radius:10px;">
            <button onclick="exportData()" style="background:var(--dark); color:white; padding:8px; border:none; border-radius:5px;">📥 تحميل نسخة</button>
            <textarea id="importArea" style="width:100%; height:60px; margin-top:10px;" placeholder="الصق كود المزامنة هنا..."></textarea>
            <button onclick="importData()" style="background:var(--blue); color:white; border:none; padding:10px; width:100%; border-radius:5px; margin-top:5px;">✅ تحديث</button>
        </div>
    </div>
</div>

<div class="cart-float" onclick="openBon()">
    <span id="cartCount">0</span> قطع | إنشاء وصل 📄
</div>

<div id="bonModal">
    <div class="bon-content">
        <button onclick="closeBon()" style="float:left; background:var(--red); color:white; border:none; padding:5px 10px;">X</button>
        <h3>تجهيز الوصل</h3>
        <input type="text" id="customerName" placeholder="اسم الزبون..." style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px;">
        <div id="printableBon" style="border:1px solid #333; padding:15px;">
            <h2 style="text-align:center;">HA EXPERT</h2>
            <p id="bonDate"></p>
            <h4 id="displayCustomer">الزبون: ....................</h4>
            <table style="width:100%; border-collapse:collapse;">
                <thead><tr style="border-bottom:1px solid #333;"><th>القطعة</th><th>السعر</th></tr></thead>
                <tbody id="bonItemsBody"></tbody>
                <tfoot><tr><th style="text-align:right">المجموع:</th><th id="bonTotal">0</th></tr></tfoot>
            </table>
        </div>
        <button onclick="sendWhatsApp()" style="width:100%; background:var(--green); color:white; padding:12px; border:none; border-radius:5px; margin-top:10px; cursor:pointer; font-weight:bold;">📱 إرسال واتساب</button>
        <button onclick="window.print()" style="width:100%; background:var(--dark); color:white; padding:12px; border:none; border-radius:5px; margin-top:5px; cursor:pointer;">🖨️ طباعة</button>
    </div>
</div>

<script>
    let stock = JSON.parse(localStorage.getItem('ha_stock')) || [];
    let cart = [];
    let currentCat = 'الكل';
    const SECRET_KEY = "HA2026";

    function secureAccess(evt) {
        let p = prompt("كود المدير:");
        if (p === SECRET_KEY) switchTab(evt, 'inventory');
        else alert("خطأ!");
    }

    function switchTab(evt, tabName) {
        document.querySelectorAll('.content').forEach(c => c.style.display = "none");
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).style.display = "block";
        if(evt.currentTarget) evt.currentTarget.classList.add("active");
        updateAll();
    }

    function saveToStock() {
        const name = document.getElementById('name').value;
        const ref = document.getElementById('ref').value || '---';
        const cat = document.getElementById('cat').value || 'عام';
        const buy = parseFloat(document.getElementById('buy').value) || 0;
        const sell = parseFloat(document.getElementById('sell').value) || 0;
        const qty = parseFloat(document.getElementById('qty').value) || 0;
        const imgInput = document.getElementById('img');

        if (!name) return alert("الاسم ضروري!");

        const finalize = (imgData) => {
            stock.push({ id: Date.now(), name, ref, cat, buy, sell, qty, img: imgData || '' });
            updateAll();
            document.querySelectorAll('.grid-inputs input').forEach(i => i.value='');
        };
        if (imgInput.files[0]) {
            const r = new FileReader(); r.onload = (e) => finalize(e.target.result); r.readAsDataURL(imgInput.files[0]);
        } else finalize('');
    }

    function updateAll() {
        localStorage.setItem('ha_stock', JSON.stringify(stock));
        renderStore();
        renderAdminTable();
    }

    function renderAdminTable() {
        document.getElementById('stockBody').innerHTML = stock.map((item, idx) => `
            <tr>
                <td><img src="${item.img || 'https://via.placeholder.com/50'}" style="width:50px; height:50px; object-fit:cover; border-radius:5px;"></td>
                <td>
                    <div style="font-weight:bold;">${item.name}</div>
                    <div class="ref-text">Ref: ${item.ref}</div>
                </td>
                <td><span style="color:var(--main)">${item.cat}</span></td>
                <td style="color:${item.qty <= 0 ? 'red' : 'black'}; font-weight:bold;">${item.qty}</td>
                <td>
                    <button onclick="outOfStock(${idx})" class="btn-action" style="background:var(--orange);" title="نفاد المخزون">⚠️</button>
                    <button onclick="deleteItem(${idx})" class="btn-action" style="background:var(--red);" title="حذف نهائي">X</button>
                </td>
            </tr>
        `).join('');
    }

    function outOfStock(idx) {
        if(confirm("هل نفدت هذه القطعة من المخزون؟")) {
            stock[idx].qty = 0;
            updateAll();
        }
    }

    function renderStore() {
        document.getElementById('storeBody').innerHTML = stock.map(item => `
            <div class="product-card ${item.qty <= 0 ? 'out-of-stock' : ''}" data-cat="${item.cat}">
                ${item.qty <= 0 ? '<span class="stock-badge">خلاصت</span>' : ''}
                <img src="${item.img || 'https://via.placeholder.com/150'}">
                <h4 style="margin:5px 0;">${item.name}</h4>
                <div style="font-size:0.7rem; color:#666;">Ref: ${item.ref}</div>
                <div class="price">${item.sell} د.ج</div>
                <button onclick="addToCart('${item.id}')" ${item.qty <= 0 ? 'disabled' : ''} style="background:var(--green); color:white; border:none; width:100%; padding:8px; border-radius:5px; cursor:pointer;">+ طلب</button>
            </div>
        `).join('');
    }

    function filterAll() {
        let s = document.getElementById('storeSearch').value.toLowerCase();
        document.querySelectorAll('.product-card').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(s) ? "" : "none";
        });
    }

    function addToCart(id) {
        cart.push(stock.find(i => i.id == id));
        document.getElementById('cartCount').innerText = cart.length;
    }

    function openBon() {
        if(cart.length === 0) return alert("السلة فارغة!");
        document.getElementById('bonModal').style.display = "block";
        document.getElementById('bonDate').innerText = "التاريخ: " + new Date().toLocaleDateString();
        let t = 0;
        document.getElementById('bonItemsBody').innerHTML = cart.map(i => { t+=parseFloat(i.sell); return `<tr><td>${i.name}</td><td>${i.sell}</td></tr>`; }).join('');
        document.getElementById('bonTotal').innerText = t + " د.ج";
        document.getElementById('customerName').oninput = function() { document.getElementById('displayCustomer').innerText = "الزبون: " + this.value; };
    }

    function closeBon() { document.getElementById('bonModal').style.display = "none"; }
    function clearCart() { cart = []; document.getElementById('cartCount').innerText = "0"; closeBon(); }
    function deleteItem(idx) { if(confirm("حذف نهائي؟")) { stock.splice(idx,1); updateAll(); } }
    function toggleSync() { let s = document.getElementById('syncTools'); s.style.display = s.style.display==='none' ? 'block' : 'none'; }
    function exportData() {
        const b = new Blob([JSON.stringify(stock)], {type:"application/json"});
        const a = document.createElement("a"); a.href=URL.createObjectURL(b); a.download="HA_Backup.json"; a.click();
    }
    function importData() {
        try {
            const p = JSON.parse(document.getElementById('importArea').value);
            if(Array.isArray(p)) { stock=p; updateAll(); alert("تم!"); toggleSync(); }
        } catch(e) { alert("خطأ!"); }
    }

    window.onload = updateAll;
</script>
</body>
</html>
