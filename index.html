<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>HA - نظام إدارة المبيعات مع النسخ الاحتياطي</title>
    <style>
        :root { --main: #D35400; --dark: #2c3e50; --green: #27ae60; --blue: #2980b9; --red: #c0392b; --purple: #8e44ad; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 20px; margin: 0; }
        .container { max-width: 1200px; background: white; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .backup-bar { background: #ebf5fb; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; gap: 10px; align-items: center; border: 1px dashed var(--blue); }
        .backup-bar span { font-weight: bold; color: var(--blue); flex-grow: 1; }

        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; border: none; cursor: pointer; background: #ddd; font-weight: bold; border-radius: 5px 5px 0 0; }
        .tab-btn.active { background: var(--main); color: white; }
        
        .content { display: none; padding: 20px; border: 1px solid #ddd; border-radius: 0 0 5px 5px; }
        .content.active { display: block; }
        
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; background: #eee; padding: 15px; border-radius: 8px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        button:hover { opacity: 0.8; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: var(--dark); color: white; padding: 10px; }
        td { border-bottom: 1px solid #eee; padding: 8px; text-align: center; }
        
        .img-box { width: 45px; height: 45px; object-fit: cover; background: #ccc; border-radius: 5px; }
        .profit-area { background: #d4efdf; padding: 15px; margin-top: 10px; border-radius: 5px; color: #1b5e20; font-size: 1.2rem; }
        
        @media print { .no-print { display: none !important; } .container { width: 100%; box-shadow: none; border: none; } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--main); margin-top:0;">HA - إدارة المخازن والمبيعات</h2>

    <div class="backup-bar no-print">
        <span>🛡️ مركز الأمان:</span>
        <button style="background: var(--purple);" onclick="exportData()">📥 تحميل نسخة احتياطية</button>
        <button style="background: var(--dark);" onclick="document.getElementById('importFile').click()">📤 استرجاع نسخة</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

    <div class="tabs no-print">
        <button class="tab-btn active" onclick="switchTab(event, 'inv')">📦 المخزن (Arrivage)</button>
        <button class="tab-btn" onclick="switchTab(event, 'pos')">🛒 البيع (Ventes)</button>
    </div>

    <div id="inv" class="content active">
        <div class="grid-inputs no-print">
            <input type="text" id="name" placeholder="اسم القطعة">
            <input type="text" id="ref" placeholder="المرجع (Ref)">
            <input type="text" id="vend" placeholder="المورد">
            <input type="text" id="buy" placeholder="سعر الشراء">
            <input type="text" id="sell" placeholder="سعر البيع">
            <input type="text" id="qty" placeholder="الكمية">
            <input type="file" id="img" accept="image/*">
            <button style="background: var(--blue)" onclick="saveToStock()">📥 إضافة للمخزن</button>
        </div>
        
        <table id="stockTable">
            <thead>
                <tr>
                    <th>الصورة</th>
                    <th>الاسم</th>
                    <th>المرجع</th>
                    <th>المورد</th>
                    <th>شراء</th>
                    <th>بيع</th>
                    <th>الكمية</th>
                    <th class="no-print">حذف</th>
                </tr>
            </thead>
            <tbody id="stockBody"></tbody>
        </table>
    </div>

    <div id="pos" class="content">
        </div>
</div>

<script>
    let stock = JSON.parse(localStorage.getItem('ha_stock')) || [];

    function switchTab(evt, tabName) {
        let i, content, tablinks;
        content = document.getElementsByClassName("content");
        for (i = 0; i < content.length; i++) content[i].style.display = "none";
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) tablinks[i].className = tablinks[i].className.replace(" active", "");
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }

    function saveToStock() {
        const name = document.getElementById('name').value;
        const ref = document.getElementById('ref').value;
        const vend = document.getElementById('vend').value;
        const buyInput = document.getElementById('buy').value || "0";
        const sellInput = document.getElementById('sell').value || "0";
        const qtyInput = document.getElementById('qty').value || "0";
        const imgInput = document.getElementById('img');

        if (name.trim() === "" || qtyInput === "0") {
            alert("يرجى إدخال اسم القطعة والكمية! ⚠️");
            return;
        }

        // معالجة العمليات الحسابية في الخانات (مثل 65+5)
        let buy, sell, qty;
        try {
            buy = eval(buyInput);
            sell = eval(sellInput);
            qty = eval(qtyInput);
        } catch(e) {
            alert("خطأ في الأرقام! تأكد من كتابتها بشكل صحيح.");
            return;
        }

        const reader = new FileReader();
        const finalize = (imageData) => {
            const newItem = {
                id: Date.now(),
                name: name,
                ref: ref,
                vend: vend,
                buy: parseFloat(buy),
                sell: parseFloat(sell),
                qty: parseFloat(qty),
                img: imageData || ''
            };
            stock.push(newItem);
            saveAndRender();
            // تنظيف الخانات
            document.querySelectorAll('.grid-inputs input').forEach(input => input.value = '');
            alert("تمت الإضافة بنجاح! ✅");
        };

        if (imgInput.files && imgInput.files[0]) {
            reader.onload = (e) => finalize(e.target.result);
            reader.readAsDataURL(imgInput.files[0]);
        } else {
            finalize('');
        }
    }

    function saveAndRender() {
        localStorage.setItem('ha_stock', JSON.stringify(stock));
        renderStock();
    }

    function renderStock() {
        const body = document.getElementById('stockBody');
        body.innerHTML = '';
        stock.forEach((item, index) => {
            body.innerHTML += `
                <tr>
                    <td><img src="${item.img || ''}" class="img-box"></td>
                    <td>${item.name}</td>
                    <td>${item.ref}</td>
                    <td>${item.vend}</td>
                    <td>${item.buy}</td>
                    <td>${item.sell}</td>
                    <td>${item.qty}</td>
                    <td class="no-print"><button style="background:var(--red)" onclick="deleteItem(${index})">حذف</button></td>
                </tr>
            `;
        });
    }

    function deleteItem(index) {
        if(confirm("هل أنت متأكد من الحذف؟")) {
            stock.splice(index, 1);
            saveAndRender();
        }
    }

    // دوال النسخ الاحتياطي
    function exportData() {
        const dataStr = JSON.stringify(stock);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `HA_Backup_${new Date().toLocaleDateString()}.json`;
        link.click();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            stock = JSON.parse(e.target.result);
            saveAndRender();
            alert("تم استرجاع البيانات بنجاح! 📥");
        };
        reader.readAsText(file);
    }

    // تشغيل العرض عند فتح الصفحة
    window.onload = renderStock;
</script>

</body>
</html>
