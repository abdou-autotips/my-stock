<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA EXPERT v5.2 - النظام الشامل</title>
    <style>
        :root { --main: #D35400; --dark: #2c3e50; --green: #27ae60; --blue: #2980b9; --red: #c0392b; --orange: #f39c12; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .container { max-width: 1200px; background: white; margin: auto; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* شاشة التحميل */
        #loader { text-align:center; padding:50px; background:white; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .spin { border: 5px solid #f3f3f3; border-top: 5px solid var(--main); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; cursor: pointer; background: #ddd; font-weight: bold; border-radius: 8px; }
        .tab-btn.active { background: var(--main); color: white; }
        .content { display: none; }
        .content.active { display: block; }
        
        .search-box { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid var(--main); border-radius: 8px; box-sizing: border-box; }
        .store-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        .product-card { border: 1px solid #eee; border-radius: 10px; padding: 10px; text-align: center; background: white; position: relative; }
        .product-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
        .out-of-stock { filter: grayscale(1); opacity: 0.6; }
        .stock-badge { position: absolute; top: 5px; left: 5px; background: var(--red); color: white; padding: 2px 5px; border-radius: 5px; font-size: 0.7rem; }
        .price { color: var(--main); font-weight: bold; margin: 5px 0; }

        .admin-form { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ddd; }
        .admin-form input { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        .admin-table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: var(--dark); color: white; padding: 12px; }
        td { border-bottom: 1px solid #eee; padding: 10px; text-align: center; }

        .cart-float { position: fixed; bottom: 20px; left: 20px; background: var(--green); color: white; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 1000; }
        #bonModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; padding:20px; box-sizing:border-box; }
        .bon-content { background:white; max-width:600px; margin:auto; padding:20px; border-radius:10px; max-height: 90vh; overflow-y: auto; }
        
        @media print { body * { visibility: hidden; } #printableBon, #printableBon * { visibility: visible; } #printableBon { position: absolute; left:0; top:0; width:100%; } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spin"></div>
    <h3 style="margin-top:15px;">جاري تحميل السلعة... 📦</h3>
</div>

<div class="container">
    <h2 style="text-align:center; color:var(--main);">HA EXPERT v5.2</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'store')">🛒 المتجر</button>
        <button class="tab-btn" onclick="secureAccess(event)">📦 المدير</button>
    </div>

    <div id="store" class="content active">
        <input type="text" id="storeSearch" class="search-box" placeholder="🔍 ابحث بالاسم أو المرجع..." onkeyup="filterAll()">
        <div class="store-grid" id="storeBody"></div>
    </div>

    <div id="inventory" class="content">
        <div class="admin-form">
            <input type="text" id="name" placeholder="اسم القطعة / المرجع التقني">
            <input type="text" id="ref" placeholder="وصف القطعة (Désignation)">
            <input type="text" id="cat" placeholder="الماركة">
            <input type="number" id="buy" placeholder="سعر الشراء">
            <input type="number" id="sell" placeholder="سعر البيع">
            <input type="number" id="qty" placeholder="الكمية">
            <input type="file" id="img" accept="image/*">
            <button onclick="saveToStock()" style="width:100%; background:var(--blue); color:white; padding:12px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">📥 إضافة للمخزون</button>
        </div>

        <div style="background:#d4edda; padding:15px; border-radius:10px; margin-bottom:15px; border:1px dashed #155724;">
            <strong>📥 دمج السلعة من الملف القديم (Backup):</strong>
            <input type="file" id="importFile" accept=".json" onchange="importOldStock(event)" style="margin-top:10px; width:100%;">
        </div>

        <div style="background:#e9ecef; padding:15px; border-radius:10px; margin-bottom:15px; border:1px solid #ccc;">
            <strong>نشر التحديث للزبائن:</strong><br>
            <button onclick="exportData()" style="background:var(--dark); color:white; padding:8px; border:none; border-radius:5px; margin-top:5px; cursor:pointer;">1. حمل ملف stock.json</button>
            <p style="font-size:0.8rem; margin:5px 0;">2. ارفعه لـ GitHub ليتحدث عند الجميع.</p>
        </div>

        <div class="admin-table-container">
            <table>
                <thead><tr><th>الصورة</th><th>الاسم/المرجع</th><th>الكمية</th><th>الإجراءات</th></tr></thead>
                <tbody id="stockBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="cart-float" onclick="openBon()">
    <span id="cartCount">0</span> قطع | إنشاء وصل 📄
</div>

<div id="bonModal">
    <div class="bon-content">
        <button onclick="closeBon()" style="float:left; background:var(--red); color:white; border:none; padding:5px 10px;">X</button>
        <h3>تجهيز الوصل</h3>
        <input type="text" id="customerName" placeholder="اسم الزبون..." style="width:100%; padding:10px; margin-bottom:10px;">
        <div id="printableBon" style="border:1px solid #333; padding:15px; background:white;">
            <h2 style="text-align:center; margin:0;">HA EXPERT</h2>
            <p id="bonDate" style="text-align:center; font-size:0.8rem;"></p>
            <h4 id="displayCustomer">الزبون: ....................</h4>
            <table style="width:100%; border-collapse:collapse;">
                <thead><tr style="border-bottom:1px solid #333;"><th>القطعة</th><th>السعر</th></tr></thead>
                <tbody id="bonItemsBody"></tbody>
                <tfoot><tr style="border-top:1px solid #333;"><th style="text-align:right">المجموع:</th><th id="bonTotal">0</th></tr></tfoot>
            </table>
        </div>
        <button onclick="sendWhatsApp()" style="width:100%; background:var(--green); color:white; padding:12px; border:none; border-radius:5px; margin-top:10px; font-weight:bold; cursor:pointer;">📱 إرسال عبر WhatsApp</button>
        <button onclick="window.print()" style="width:100%; background:var(--dark); color:white; padding:12px; border:none; border-radius:5px; margin-top:5px; cursor:pointer;">🖨️ طباعة</button>
        <button onclick="clearCart()" style="width:100%; background:var(--red); color:white; padding:10px; border:none; border-radius:5px; margin-top:5px; cursor:pointer;">🗑️ تفريغ</button>
    </div>
</div>

<script>
    let stock = [];
    let cart = [];
    const SECRET_KEY = "HA2026";
    const MY_PHONE = "213XXXXXXXXX"; 

    async function loadStock() {
        const loader = document.getElementById('loader');
        try {
            const response = await fetch('stock.json');
            if (response.ok) stock = await response.json();
            else stock = JSON.parse(localStorage.getItem('ha_stock')) || [];
        } catch (e) {
            stock = JSON.parse(localStorage.getItem('ha_stock')) || [];
        }
        loader.style.display = "none";
        updateAll();
    }

    function importOldStock(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const oldData = JSON.parse(e.target.result);
                if (Array.isArray(oldData)) {
                    const existingIds = new Set(stock.map(item => item.id));
                    const newItems = oldData.filter(item => !existingIds.has(item.id));
                    stock = [...stock, ...newItems];
                    localStorage.setItem('ha_stock', JSON.stringify(stock));
                    updateAll();
                    alert("✅ تم دمج " + newItems.length + " قطعة!");
                }
            } catch (err) { alert("❌ خطأ في الملف"); }
        };
        reader.readAsText(file);
    }

    function saveToStock() {
        const name = document.getElementById('name').value;
        const ref = document.getElementById('ref').value || '---';
        const cat = document.getElementById('cat').value || 'عام';
        const buy = parseFloat(document.getElementById('buy').value) || 0;
        const sell = parseFloat(document.getElementById('sell').value) || 0;
        const qty = parseFloat(document.getElementById('qty').value) || 0;
        const imgInput = document.getElementById('img');
        if(!name) return alert("الاسم ضروري!");
        const finalize = (imgData) => {
            stock.push({ id: Date.now(), name, ref, cat, buy, sell, qty, img: imgData || '' });
            localStorage.setItem('ha_stock', JSON.stringify(stock));
            updateAll();
            document.querySelectorAll('.admin-form input').forEach(i => i.value='');
        };
        if (imgInput.files[0]) {
            const r = new FileReader(); r.onload = (e) => finalize(e.target.result); r.readAsDataURL(imgInput.files[0]);
        } else finalize('');
    }

    function updateAll() {
        stock.sort((a, b) => a.name.toLowerCase().localeCompare(b.name.toLowerCase()));
        renderStore();
        renderAdminTable();
    }

    function renderStore() {
        document.getElementById('storeBody').innerHTML = stock.map(item => `
            <div class="product-card ${item.qty <= 0 ? 'out-of-stock' : ''}">
                ${item.qty <= 0 ? '<span class="stock-badge">خلاصت</span>' : ''}
                <img src="${item.img || 'https://via.placeholder.com/150'}">
                <h4>${item.name}</h4>
                <div style="font-size:0.7rem; color:#666;">${item.ref}</div>
                <div class="price">${item.sell} د.ج</div>
                <button onclick="addToCart('${item.id}')" ${item.qty <= 0 ? 'disabled' : ''} style="background:var(--green); color:white; border:none; width:100%; padding:8px; border-radius:5px; cursor:pointer;">+ طلب</button>
            </div>
        `).join('');
    }

    function renderAdminTable() {
        document.getElementById('stockBody').innerHTML = stock.map((item, idx) => `
            <tr>
                <td><img src="${item.img}" style="width:40px; height:40px; object-fit:cover; border-radius:5px;"></td>
                <td><b>${item.name}</b><br><small>${item.ref}</small></td>
                <td style="color:${item.qty <= 0 ? 'red' : 'black'}; font-weight:bold;">${item.qty}</td>
                <td>
                    <button onclick="outOfStock(${idx})" style="background:var(--orange); color:white; border:none; padding:5px; cursor:pointer;">⚠️</button>
                    <button onclick="deleteItem(${idx})" style="background:var(--red); color:white; border:none; padding:5px; cursor:pointer;">X</button>
                </td>
            </tr>
        `).join('');
    }

    function outOfStock(idx) { stock[idx].qty = 0; localStorage.setItem('ha_stock', JSON.stringify(stock)); updateAll(); }
    function deleteItem(idx) { if(confirm("حذف؟")) { stock.splice(idx,1); localStorage.setItem('ha_stock', JSON.stringify(stock)); updateAll(); } }
    function addToCart(id) { cart.push(stock.find(i => i.id == id)); document.getElementById('cartCount').innerText = cart.length; }
    function openBon() {
        document.getElementById('bonModal').style.display = "block";
        document.getElementById('bonDate').innerText = "التاريخ: " + new Date().toLocaleDateString();
        let t = 0;
        document.getElementById('bonItemsBody').innerHTML = cart.map(i => { t+=parseFloat(i.sell); return `<tr><td>${i.name}</td><td>${i.sell}</td></tr>`; }).join('');
        document.getElementById('bonTotal').innerText = t + " د.ج";
        document.getElementById('customerName').oninput = function() { document.getElementById('displayCustomer').innerText = "الزبون: " + this.value; };
    }
    function sendWhatsApp() {
        let text = `📦 *طلب جديد - HA EXPERT*\n👤 *الزبون:* ${document.getElementById('customerName').value}\n----------\n`;
        let total = 0;
        cart.forEach(i => { text += `• ${i.name} -> ${i.sell} د.ج\n`; total += parseFloat(i.sell); });
        text += `----------\n💰 *المجموع:* ${total} د.ج`;
        window.open(`https://wa.me/${MY_PHONE}?text=${encodeURIComponent(text)}`);
    }
    function closeBon() { document.getElementById('bonModal').style.display = "none"; }
    function clearCart() { cart = []; document.getElementById('cartCount').innerText = "0"; closeBon(); }
    function filterAll() {
        let s = document.getElementById('storeSearch').value.toLowerCase();
        document.querySelectorAll('.product-card').forEach(card => card.style.display = card.innerText.toLowerCase().includes(s) ? "" : "none");
    }
    function exportData() {
        const b = new Blob([JSON.stringify(stock)], {type:"application/json"});
        const a = document.createElement("a"); a.href=URL.createObjectURL(b); a.download="stock.json"; a.click();
    }
    function switchTab(evt, tabName) {
        document.querySelectorAll('.content').forEach(c => c.style.display = "none");
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).style.display = "block";
        if(evt.currentTarget) evt.currentTarget.classList.add("active");
    }
    function secureAccess(evt) {
        let p = prompt("كود المدير:");
        if (p === SECRET_KEY) switchTab(evt, 'inventory');
        else alert("خطأ!");
    }
    window.onload = loadStock;
</script>
</body>
</html>
