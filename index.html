<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA EXPERT v4.1 - النسخة الاحترافية</title>
    <style>
        :root { --main: #D35400; --dark: #2c3e50; --green: #27ae60; --blue: #2980b9; --red: #c0392b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .container { max-width: 1200px; background: white; margin: auto; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; cursor: pointer; background: #ddd; font-weight: bold; border-radius: 8px; }
        .tab-btn.active { background: var(--main); color: white; }
        .content { display: none; }
        .content.active { display: block; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid var(--main); border-radius: 8px; box-sizing: border-box; }
        .cat-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; scrollbar-width: none; }
        .cat-btn { background: #eee; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .cat-btn.active { background: var(--dark); color: white; }
        .store-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        .product-card { border: 1px solid #eee; border-radius: 10px; padding: 10px; text-align: center; background: white; position: relative; }
        .product-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
        .price { color: var(--main); font-weight: bold; margin: 5px 0; }
        .cart-float { position: fixed; bottom: 20px; left: 20px; background: var(--green); color: white; padding: 12px 20px; border-radius: 50px; cursor: pointer; z-index: 1000; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #bonModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; overflow-y:auto; padding:20px; box-sizing:border-box; }
        .bon-content { background:white; max-width:600px; margin:auto; padding:30px; border-radius:10px; position:relative; }
        #printableBon { border: 2px solid #333; padding: 20px; color: #000; background: white; }
        .bon-header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .bon-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .bon-table th, .bon-table td { border: 1px solid #333; padding: 8px; text-align: center; }
        @media print { body * { visibility: hidden; } #printableBon, #printableBon * { visibility: visible; } #printableBon { position: absolute; left: 0; top: 0; width: 100%; } }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th { background: var(--dark); color: white; padding: 10px; }
        td { border-bottom: 1px solid #eee; padding: 8px; text-align: center; }
        .sync-area { margin-top:20px; background:#f0f2f5; padding:15px; border-radius:10px; border:1px dashed #adb5bd; display:none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--main);">HA EXPERT v4.1</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'store')">🛒 المتجر</button>
        <button class="tab-btn" onclick="secureAccess(event)">📦 المدير</button>
    </div>

    <div id="store" class="content active">
        <input type="text" id="storeSearch" class="search-box" placeholder="🔍 ابحث عن قطعة..." onkeyup="filterAll()">
        <div class="cat-bar" id="catBar">
            <button class="cat-btn active" onclick="setCat('الكل')">الكل</button>
        </div>
        <div class="store-grid" id="storeBody"></div>
    </div>

    <div id="inventory" class="content">
        <div class="grid-inputs">
            <input type="text" id="name" placeholder="اسم القطعة">
            <input type="text" id="cat" placeholder="الماركة (206, Symbol...)">
            <input type="number" id="buy" placeholder="سعر الشراء">
            <input type="number" id="sell" placeholder="سعر البيع">
            <input type="number" id="qty" placeholder="الكمية">
            <input type="file" id="img" accept="image/*">
            <button onclick="saveToStock()" style="background:var(--blue); color:white; border:none; cursor:pointer; font-weight:bold; border-radius:5px;">📥 إضافة قطعة</button>
        </div>
        <table>
            <thead><tr><th>الصورة</th><th>الاسم</th><th>الكمية</th><th>حذف</th></tr></thead>
            <tbody id="stockBody"></tbody>
        </table>

        <button onclick="toggleSync()" style="margin-top:30px; background:none; border:1px solid #ccc; color:#888; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:0.8rem;">⚙️ إعدادات المزامنة والأمان</button>
        
        <div id="syncTools" class="sync-area">
            <h4>🔄 مزامنة البيانات (Backup)</h4>
            <button onclick="exportData()" style="padding:10px; background:var(--dark); color:white; border:none; border-radius:5px; cursor:pointer; margin-bottom:10px;">📥 تحميل نسخة للملفات</button>
            <textarea id="importArea" style="width:100%; height:60px; margin-top:10px;" placeholder="الصق كود المزامنة هنا..."></textarea>
            <button onclick="importData()" style="background:var(--blue); color:white; border:none; padding:10px; width:100%; margin-top:5px; cursor:pointer; border-radius:5px;">✅ تحديث البيانات</button>
        </div>
    </div>
</div>

<div class="cart-float" onclick="openBon()">
    <span id="cartCount">0</span> قطع | إنشاء وصل (BON) 📄
</div>

<div id="bonModal">
    <div class="bon-content">
        <button onclick="closeBon()" style="float:left; background:var(--red); color:white; border:none; padding:5px 10px; cursor:pointer;">إغلاق X</button>
        <h3>تجهيز الوصل</h3>
        <input type="text" id="customerName" placeholder="اسم الزبون..." style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px;">
        
        <div id="printableBon">
            <div class="bon-header">
                <h2>HA EXPERT - قطع الغيار</h2>
                <p>وصل استلام (Bon de Livraison)</p>
                <p id="bonDate"></p>
                <h4 id="displayCustomer">الزبون: ....................</h4>
            </div>
            <table class="bon-table">
                <thead><tr><th>القطعة</th><th>السعر</th></tr></thead>
                <tbody id="bonItemsBody"></tbody>
                <tfoot><tr><th>المجموع الإجمالي:</th><th id="bonTotal">0</th></tr></tfoot>
            </table>
            <p style="text-align:center; font-size:0.8rem;">شكراً لثقتكم بنا!</p>
        </div>
        
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="window.print()" style="flex:1; padding:15px; background:var(--dark); color:white; border:none; cursor:pointer; border-radius:5px; font-weight:bold;">🖨️ طباعة أو حفظ PDF</button>
            <button onclick="clearCart()" style="padding:15px; background:var(--red); color:white; border:none; cursor:pointer; border-radius:5px;">🗑️ تفريغ</button>
        </div>
    </div>
</div>

<script>
    let stock = JSON.parse(localStorage.getItem('ha_stock')) || [];
    let cart = [];
    let currentCat = 'الكل';
    const SECRET_KEY = "HA2026";

    function secureAccess(evt) {
        let pass = prompt("أدخل كود المدير:");
        if (pass === SECRET_KEY) switchTab(evt, 'inventory');
        else alert("كود خاطئ!");
    }

    function switchTab(evt, tabName) {
        document.querySelectorAll('.content').forEach(c => c.style.display = "none");
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).style.display = "block";
        if(evt.currentTarget) evt.currentTarget.classList.add("active");
        updateAll();
    }

    function saveToStock() {
        const name = document.getElementById('name').value;
        const cat = document.getElementById('cat').value || 'عام';
        const buy = parseFloat(document.getElementById('buy').value) || 0;
        const sell = parseFloat(document.getElementById('sell').value) || 0;
        const qty = parseFloat(document.getElementById('qty').value) || 0;
        const imgInput = document.getElementById('img');

        if (!name) return alert("الاسم ضروري!");

        const finalize = (imgData) => {
            stock.push({ id: Date.now(), name, cat, buy, sell, qty, img: imgData || '' });
            updateAll();
            document.querySelectorAll('.grid-inputs input').forEach(i => i.value = '');
        };
        if (imgInput.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => finalize(e.target.result);
            reader.readAsDataURL(imgInput.files[0]);
        } else finalize('');
    }

    function updateAll() {
        stock.sort((a, b) => a.name.toLowerCase().localeCompare(b.name.toLowerCase()));
        localStorage.setItem('ha_stock', JSON.stringify(stock));
        renderStore();
        renderAdminTable();
        renderCategories();
    }

    function renderCategories() {
        const cats = ['الكل', ...new Set(stock.map(item => item.cat))];
        document.getElementById('catBar').innerHTML = cats.map(c => `
            <button class="cat-btn ${currentCat === c ? 'active' : ''}" onclick="setCat('${c}')">${c}</button>
        `).join('');
    }

    function setCat(c) { currentCat = c; filterAll(); }

    function filterAll() {
        const s = document.getElementById('storeSearch').value.toLowerCase();
        document.querySelectorAll('.product-card').forEach(card => {
            const matchesSearch = card.innerText.toLowerCase().includes(s);
            const matchesCat = (currentCat === 'الكل' || card.getAttribute('data-cat') === currentCat);
            card.style.display = (matchesSearch && matchesCat) ? "" : "none";
        });
    }

    function renderStore() {
        document.getElementById('storeBody').innerHTML = stock.map(item => `
            <div class="product-card" data-cat="${item.cat}">
                <img src="${item.img || 'https://via.placeholder.com/150'}">
                <h4>${item.name}</h4>
                <div class="price">${item.sell} د.ج</div>
                <button onclick="addToCart('${item.id}')" style="background:var(--green); color:white; border:none; width:100%; padding:8px; border-radius:5px; cursor:pointer;">+ إضافة للوصل</button>
            </div>
        `).join('');
    }

    function renderAdminTable() {
        document.getElementById('stockBody').innerHTML = stock.map((item, idx) => `
            <tr>
                <td><img src="${item.img}" style="width:40px;height:40px;object-fit:cover;border-radius:5px;"></td>
                <td>${item.name}</td>
                <td>${item.qty}</td>
                <td><button onclick="deleteItem(${idx})" style="color:red;background:none;border:none;font-weight:bold;cursor:pointer;">X</button></td>
            </tr>
        `).join('');
    }

    function addToCart(id) {
        cart.push(stock.find(i => i.id == id));
        document.getElementById('cartCount').innerText = cart.length;
    }

    function openBon() {
        if(cart.length === 0) return alert("السلة فارغة!");
        document.getElementById('bonModal').style.display = "block";
        document.getElementById('bonDate').innerText = "التاريخ: " + new Date().toLocaleDateString();
        let total = 0;
        document.getElementById('bonItemsBody').innerHTML = cart.map(item => {
            total += parseFloat(item.sell);
            return `<tr><td>${item.name}</td><td>${item.sell} د.ج</td></tr>`;
        }).join('');
        document.getElementById('bonTotal').innerText = total + " د.ج";
        document.getElementById('customerName').oninput = function() {
            document.getElementById('displayCustomer').innerText = "الزبون: " + this.value;
        };
    }

    function closeBon() { document.getElementById('bonModal').style.display = "none"; }
    function clearCart() { cart = []; document.getElementById('cartCount').innerText = "0"; closeBon(); }
    function deleteItem(idx) { if(confirm("حذف؟")) { stock.splice(idx,1); updateAll(); } }

    function toggleSync() {
        const tools = document.getElementById('syncTools');
        tools.style.display = tools.style.display === 'none' ? 'block' : 'none';
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(stock)], {type: "application/json"});
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
        a.download = "HA_Stock_Backup.json"; a.click();
    }

    function importData() {
        try {
            const parsed = JSON.parse(document.getElementById('importArea').value);
            if (Array.isArray(parsed)) { stock = parsed; updateAll(); alert("تم التحديث بنجاح!"); toggleSync(); }
        } catch(e) { alert("خطأ في الكود الملصق!"); }
    }

    window.onload = updateAll;
</script>
</body>
</html>
